########################################################################
# adbot-ai-product — SELF-HOST (CF Deploy Button) Cloudflare Pages config
#
# THIS FILE IS FOR SELF-HOST CUSTOMERS, NOT GOLF'S PRODUCTION DEPLOY.
# Golf's production uses `wrangler.toml` (with his real D1+KV IDs).
#
# Customer install flow via CF Deploy Button:
#   1. Customer clicks https://deploy.workers.cloudflare.com/?url=<this-repo>&branch=master
#   2. CF forks this repo to customer's GitHub
#   3. CF reads this file (once renamed to `wrangler.toml` per rename step below)
#   4. CF auto-provisions D1 + KV in customer's CF account (placeholder IDs below are ignored)
#   5. CF deploys Pages project → customer has a live self-host instance
#   6. Customer sets 7 required secrets via Pages Dashboard OR `wrangler pages secret put`
#      (see list at bottom; no prompt flow in Deploy Button v1)
#
# For Deploy Button to use THIS file instead of Golf's `wrangler.toml`, the
# public/template repo should either:
#   (a) rename this file → `wrangler.toml` at the root of the customer-forked repo, OR
#   (b) use a separate branch whose wrangler.toml IS this file's content
#
# Either way, the placeholder IDs below (all-zeros) signal CF Deploy Button that
# these resources should be newly-provisioned in the customer's account, not
# referenced by ID. If CF instead tries to attach to these placeholders, it will
# fail loudly (404 on a zero UUID) — the test-must-fail-first RED state.
#
# DEVOPS-drafted 2026-04-19 per PLANNER dispatch (Quick Install Path A, B2 fix).
########################################################################

# name IS required by wrangler schema — removing it breaks config parse (verified
# via `bunx wrangler pages deploy`: 'Missing top-level field "name"').
# Collision with customer's existing 'adbot-ai' project is a Deploy Button UX
# issue the operator overrides at project-create time (CF Dashboard prompts for
# project slug), NOT a schema-level fix.
name = "adbot-ai"
compatibility_date = "2025-03-28"
compatibility_flags = ["nodejs_compat"]

# Pages output dir — the only wrangler.toml Pages-build key that exists in
# the schema. `pages_build_command` is NOT a valid wrangler.toml field (verified
# 2026-04-19: 'Unexpected fields found in top-level field: pages_build_command').
# Build command is configured in CF Pages Dashboard post-project-create, OR via
# the `_build` field in CF Dashboard's UI — not via wrangler.toml.
pages_build_output_dir = "dist"

[observability]
enabled = true

# ─── D1 — users, rules, bot_actions, audit history ───
# database_name is REQUIRED by schema (empty string triggers parse error on
# Deploy Button path — not TESTED via wrangler CLI yet but conservative).
# Hardcoded name = collision risk on the customer's own account is a Deploy
# Button UX issue (customer sees CF prompt to choose new name) — NOT a
# schema-layer fix.
[[d1_databases]]
binding = "DB"
database_name = "adbot-ai-db"                             # CF Deploy Button may prompt-override at provision
database_id = "00000000-0000-0000-0000-000000000000"  # CF auto-provisions — do not edit

# ─── KV — OAuth CSRF state + rate-limit counters ───
# Placeholder ID — same semantics as D1 above.
[[kv_namespaces]]
binding = "STATE_KV"
id = "00000000000000000000000000000000"  # CF auto-provisions — do not edit

# ─── KV — v1.3 boot-generated secrets (JWT_SECRET + TOKEN_ENCRYPTION_KEY +
# CRON_SECRET). Worker auto-generates these on first request if env vars
# are unset; persists to this KV namespace; reuses forever after. Separate
# from STATE_KV per GUARD A3 blast-radius isolation.
# Placeholder ID — CF Deploy Button creates a new KV named `adbot-secrets`
# in the customer's account; v1.3 boot-secrets.ts uses whichever binding.
[[kv_namespaces]]
binding = "ADBOT_SECRETS_KV"
id = "00000000000000000000000000000001"  # CF auto-provisions — do not edit

# ─── Optional — Cloudflare Queues for AI feature async work ───
# Only needed if you run the ai-features-consumer/ worker. Comment out if
# not using. Create with: bunx wrangler queues create ai-features-queue
# [[queues.producers]]
# binding = "AI_FEATURES_QUEUE"
# queue = "ai-features-queue"

# ─── Cron Triggers ───
# NOTE: CF Pages does NOT support [triggers] in wrangler config (Workers-only).
# Daily heartbeat is handled by one of:
#   1. CF Pages Dashboard → Settings → Functions → Cron Triggers (manual, per-customer)
#   2. External scheduler POSTing to /api/cron/heartbeat (CRON_SECRET-gated)
#   3. Golf's brain-side cron (upstream, runs regardless of customer deployment)
# Customer can safely skip this on first deploy — license works fine without it.

# ─── Plain env vars (pre-filled for self-host customers — v1.1 minimize-form) ───
#
# These are SAFE to pre-fill in a PUBLIC template because every value here is
# either a public URL (brain, redirect) or a public OAuth client ID.
#
# GUARD-approved 2026-04-19 (v1.1 phased: no secrets in public repo — roadmap
# v1.2 runtime-derive ADBOT_DOMAIN + PUBLIC_ORIGIN, v1.3 boot-gen JWT_SECRET,
# v1.4 brain-proxy FB refactor removes FB_APP_SECRET from customer side).
[vars]
# Central brain — customer's deployment calls this for license validate + AI proxy.
ADBOT_BRAIN_URL = "https://adbot-ai-brain.golfservera.workers.dev"

# Central Facebook app ID (Hybrid C: all customers share one app).
# ID only — NEVER pre-fill FB_APP_SECRET here; it's a secret, stays on brain.
FB_APP_ID = "849762461469905"

# FB OAuth redirect URI → brain's callback (brain owns the code→token exchange
# using its own FB_APP_SECRET; customer side never holds the secret).
# Per GUARD audit 2026-04-19 + commit 2a99751 brain /oauth/fb/* single-URI pattern.
FB_REDIRECT_URI = "https://adbot-ai-brain.golfservera.workers.dev/oauth/fb/callback"

# ─── Empty-string pre-fills — CF Deploy Button form behavior fix 2026-04-19 ───
# Golf empirical test: ANY env var referenced by functions/ code but NOT in
# [vars] block is rendered as a REQUIRED input in CF Deploy Button UI. The
# customer then can't submit the form until they type placeholder text in
# every empty slot — obviously wrong for optional/auto-handled fields.
#
# Declaring them here with empty string tells CF "these are pre-filled (with
# empty), customer may override but is NOT required to fill". The worker code
# already has defensive fallbacks (e.g., boot-secrets checks trim().length > 0
# before falling through to KV; LLM-* fields have numeric defaults; Telegram
# etc. are feature-gated on presence).
#
# ADBOT_LICENSE_JWT is intentionally OMITTED — it's the single required input,
# the ONE field the customer MUST paste for the deployment to work.
ADBOT_DOMAIN = ""                          # v1.2 runtime-derived from CF_PAGES_URL
PUBLIC_ORIGIN = ""                         # v1.2 runtime-derived
JWT_SECRET = ""                            # v1.3 boot-gen into ADBOT_SECRETS_KV
TOKEN_ENCRYPTION_KEY = ""                  # v1.3 boot-gen
CRON_SECRET = ""                           # v1.3 boot-gen
ANTHROPIC_API_KEY = ""                     # AI features opt-in; set later via Settings
RESEND_API_KEY = ""                        # Email opt-in; brain delivery fallback
TELEGRAM_BOT_TOKEN = ""                    # Alerts opt-in
TELEGRAM_CHAT_ID = ""                      # Alerts opt-in
TELEGRAM_WEBHOOK_SECRET = ""               # Alerts opt-in
CRM_WEBHOOK_SECRET = ""                    # CRM integration opt-in
DEBUG_RULES = ""                           # Dev flag — leave empty in prod
LLM_DISABLED = ""                          # Kill-switch; blank = enabled
LLM_ALLOWED_MODELS = ""                    # csv of claude-* ids; blank = default allowlist
LLM_MAX_INPUT_TOKENS = ""                  # numeric; blank = code default
LLM_GLOBAL_DAILY_COST_USD_MICRO = ""       # numeric; blank = code default
LLM_GLOBAL_HOURLY_COST_USD_MICRO = ""      # numeric; blank = code default
LLM_GLOBAL_ALERT_THRESHOLD_PERMIL = ""     # numeric; blank = code default
LLM_USER_DAILY_COST_USD_MICRO = ""         # numeric; blank = code default
LLM_USER_DAILY_LIMIT = ""                  # numeric; blank = code default
LLM_USER_HOURLY_LIMIT = ""                 # numeric; blank = code default

# ADBOT_DOMAIN must be set per-deployment (customer's own Pages subdomain).
# Can be set via:
#   - Pages Dashboard → Settings → Environment Variables → Production (plain)
#   - `wrangler pages secret put ADBOT_DOMAIN` (secret)
# Either works — brain reads it via process.env just the same.
# Roadmap v1.2: auto-derived from CF_PAGES_URL at runtime; this comment goes away.

########################################################################
# Customer env surface (v1.3 + v1.4 shipped): ONE required input only.
#
# REQUIRED — 1 field:
#
#   ADBOT_LICENSE_JWT      - License JWT from purchase email. Without this,
#                            every /api/* route returns 402 license_required.
#                            This is the ONLY customer-set secret post-v1.4.
#
# AUTO-HANDLED by the worker (customer does nothing):
#   - JWT_SECRET           — v1.3 boot-gen into ADBOT_SECRETS_KV on first request
#   - TOKEN_ENCRYPTION_KEY — v1.3 boot-gen same path
#   - CRON_SECRET          — v1.3 boot-gen same path
#   - ADBOT_DOMAIN         — v1.2 derived from CF_PAGES_URL at runtime
#   - PUBLIC_ORIGIN        — v1.2 derived from CF_PAGES_URL at runtime
#   - FB_APP_SECRET        — v1.4 removed; all FB OAuth routes through brain
#                            (brain holds the secret in its own Worker secret)
#   - FB_APP_ID            — pre-filled in [vars] above (public value)
#   - FB_REDIRECT_URI      — pre-filled in [vars] above (brain callback URL)
#   - ADBOT_BRAIN_URL      — pre-filled in [vars] above
#
# OPTIONAL (all skippable on first deploy — customer adds later via
# /settings/integrations UI for runtime config):
#   ANTHROPIC_API_KEY, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID,
#   TELEGRAM_WEBHOOK_SECRET, RESEND_API_KEY, LLM_DISABLED,
#   LLM_ALLOWED_MODELS, LLM_MAX_INPUT_TOKENS,
#   LLM_GLOBAL_DAILY_COST_USD_MICRO, LLM_GLOBAL_HOURLY_COST_USD_MICRO,
#   LLM_USER_DAILY_LIMIT, LLM_USER_HOURLY_LIMIT
#
# Push via Pages Dashboard OR CLI:
#   bunx wrangler pages secret put ADBOT_LICENSE_JWT --project-name=<project>
#
# Do NOT set these in self-host deployments (dev endpoints are stripped):
#   DEV_TOKEN_INJECT, DEV_TRIGGER_ENABLED, DEBUG_RULES
#
# Override escape hatches (for ops rotation, advanced customers):
# Explicit JWT_SECRET / TOKEN_ENCRYPTION_KEY / CRON_SECRET env vars take
# precedence over boot-gen — customer can rotate by setting the env var
# and deleting the matching KV key (next cold start regenerates).
########################################################################
